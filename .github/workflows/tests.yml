name: Tests

on:
  push:
    branches: [main, "preview/**"]
  pull_request:

permissions:
  contents: read

jobs:
  node-tests:
    name: Analyzer, conversion & wiring tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Syntax-check all first-party scripts
        run: node --check assets/js/*.js

      # Dependency-free suite (node:test) — analyzer regressions for every
      # source module, semantic conversion cases, and page↔engine↔module
      # wiring checks. See test/ and the notes in .claude/CLAUDE.md.
      - name: Run tests
        run: node --test
