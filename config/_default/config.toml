# Base Hugo config. baseURL is intentionally relative here so local dev / PR
# previews resolve identically; config/production/config.toml overrides it.
baseURL = "/"
languageCode = "en-us"
title = "NGINX - Networking for Kubernetes"
enableGitInfo = true
enableRobotsTXT = true
# No taxonomies on this hub site — drop the stray /categories/ and /tags/ pages.
disableKinds = ["taxonomy", "term"]

# Import the docs.nginx.com theme as a Hugo Module (pinned to v2.0.9 in go.mod).
[module]
  [[module.imports]]
    path = "github.com/nginxinc/nginx-hugo-theme/v2"

[caches]
  [caches.modules]
    maxAge = -1

[markup]
  [markup.goldmark.renderer]
    unsafe = true              # required for raw-html shortcode + embedded analyzer/JSON-LD
  [markup.highlight]
    noClasses = false
    guessSyntax = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]
  page = ["HTML"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  description = "NGINX on Kubernetes — the NGINX Ingress Controller, NGINX Gateway Fabric, migration tools, and ingress2gateway resources."
  author = "F5, Inc."
  # buildtype gates the theme's TrustArc/Tealium/GTM analytics partials off for the fork.
  buildtype = "package"
  github_repo = "https://github.com/alessfg/kubernetes.nginx.org"
  # The theme adds noindex to section/taxonomy kinds by default; our product pages are
  # sections and must stay indexable, so exclude "section".
  noindex_kinds = ["taxonomy", "taxonomyTerm"]
  # Feature flags: disable docs.nginx.com-only services so the theme runs standalone.
  # disable_rich_meta=true suppresses the theme's OG/Twitter so we emit our own (meta/inject.html).
  [params.featureFlags]
    disable_coveo = true
    disable_qualtrics = true
    disable_rich_meta = true
